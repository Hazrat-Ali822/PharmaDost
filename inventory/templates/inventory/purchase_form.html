{% extends 'partials/base.html' %}
{% block content %}
<h2>Receive Purchase</h2>
<form method="post">{% csrf_token %}
  <label>Supplier:</label>
  <select name="supplier">
    <option value="">--</option>
    {% for s in suppliers %}
      <option value="{{ s.id }}">{{ s.name }}</option>
    {% endfor %}
  </select>
  <label>Invoice #</label>
  <input name="invoice_number">
  <label>Paid (leave blank = full)</label>
  <input name="paid" type="number" step="0.01" min="0" placeholder="Amount paid now">
  <hr>
  <table>
    <tr><th>Medicine</th><th>Qty</th><th>Cost</th><th>Expiry</th></tr>
    {% for m in meds %}
    <tr>
      <td><input type="hidden" name="medicine_id[]" value="{{ m.id }}">{{ m.name }} ({{ m.brand }})</td>
      <td><input name="quantity[]" type="number" min="0"></td>
      <td><input name="cost_price[]" type="text" value="{{ m.price }}"></td>
      <td><input name="expiry_date[]" type="date" value="{{ m.expiry_date }}"></td>
    </tr>
    {% endfor %}
  </table>
  <button type="submit">Save Purchase</button>
</form>
{% endblock %}
