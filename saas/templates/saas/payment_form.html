{% extends 'partials/base.html' %}
{% block title %}Record Subscription Payment — PharmaDost{% endblock %}

{% block content %}
<div class="page-head">
  <h2>Record Subscription Payment 💰</h2>
  <a class="btn alt" href="{% url 'saas:dashboard' %}">Back to Portal</a>
</div>

<div class="card" style="max-width:600px; margin: 0 auto;">
  <form method="post">
    {% csrf_token %}
    
    <p>
      <label>Select Hospital</label>
      <select name="hospital_id" required style="width:100%; padding:8px; border-radius:6px; border:1px solid var(--border);">
        <option value="">-- Choose Hospital --</option>
        {% for h in hospitals %}
        <option value="{{ h.id }}">{{ h.name }} (Monthly Rate: Rs {{ h.monthly_price }})</option>
        {% endfor %}
      </select>
    </p>
    
    <p>
      <label>Amount Received (PKR)</label>
      <input type="number" step="0.01" name="amount" required placeholder="e.g. 5000">
    </p>

    <p>
      <label>Payment Date</label>
      <input type="date" name="payment_date" required value="{% now 'Y-m-d' %}">
    </p>

    <p>
      <label>Payment Notes / Method</label>
      <textarea name="note" placeholder="e.g. Received via EasyPaisa / Bank Transfer" style="width:100%; height:80px; padding:8px; border-radius:6px; border:1px solid var(--border);"></textarea>
    </p>

    <div style="margin-top:20px;">
      <button class="btn success" type="submit">Log Payment</button>
    </div>
  </form>
</div>
{% endblock %}
