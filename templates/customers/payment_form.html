{% extends 'partials/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="form-card">
  <h2>{{ title }}</h2>
  <p>Current outstanding balance: <strong>{{ customer.balance }}</strong></p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Record Payment</button>
    <a class="btn alt" href="{% url 'customer_ledger' customer.pk %}">Cancel</a>
  </form>
</div>
{% endblock %}
