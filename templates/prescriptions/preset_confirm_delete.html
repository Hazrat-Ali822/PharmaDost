{% extends 'partials/base.html' %}
{% block title %}Delete Preset — PharmaDost{% endblock %}
{% block content %}
<div class="form-card" style="max-width:500px; text-align:center;">
  <h2 style="color:var(--danger);">Delete Rx Preset?</h2>
  <p>Are you sure you want to delete the template <strong>"{{ preset.name }}"</strong>? This cannot be undone.</p>
  
  <form method="post" style="margin-top:20px; display:inline-flex; gap:8px; justify-content:center; width:100%;">
    {% csrf_token %}
    <button class="btn danger" type="submit" style="background:#ef4444; color:white; border:none; padding:10px 20px;">Yes, Delete</button>
    <a class="btn alt" href="{% url 'prescription_presets' %}">Cancel</a>
  </form>
</div>
{% endblock %}
