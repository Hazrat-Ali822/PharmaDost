{% extends 'partials/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="form-card">
  <h2>{{ title }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Save</button>
    <a class="btn alt" href="{% url 'doctor_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
