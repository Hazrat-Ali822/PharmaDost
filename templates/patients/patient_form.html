{% extends 'partials/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="form-card">
  <h2>{{ title }}</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include 'patients/_fields.html' with form=form %}
    <div style="margin-top:24px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" type="submit">Save</button>
      {% if patient %}
        <a class="btn danger" href="{% url 'patient_delete' patient.pk %}" style="background:#ef4444; color:white !important; border:none; padding:10px 16px; border-radius:8px; text-decoration:none; display:inline-flex; align-items:center;">Delete Patient</a>
      {% endif %}
      <a class="btn alt" href="{% url 'patient_list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
