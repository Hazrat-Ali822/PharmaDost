{% extends 'partials/base.html' %}
{% block title %}New Purchase Return{% endblock %}
{% block page_title %}Purchase Return{% endblock %}
{% block content %}
<h2>New Purchase Return</h2>
<form method="post" id="ret-form">{% csrf_token %}
  <div class="card" style="margin-bottom:12px">
    <div class="form-row">
      <label>Supplier</label>
      <select name="supplier">
        <option value="">-- optional --</option>
        {% for s in suppliers %}<option value="{{ s.id }}">{{ s }}</option>{% endfor %}
      </select>
      <label>Reason</label>
      <select name="reason">
        {% for val, lbl in reasons %}<option value="{{ val }}">{{ lbl }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label>Notes</label>
      <input type="text" name="notes" placeholder="Optional">
    </div>
  </div>

  <table class="tbl" id="items">
    <thead>
      <tr><th>Batch</th><th>Qty</th><th>Cost Price (optional)</th><th>Line Total</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <button class="btn alt" type="button" id="add-row">+ Add Item</button>
  <div class="total-wrap">Return Total: <strong id="grand-total">0</strong></div>
  <button class="btn primary" type="submit">Save Return</button>
</form>

<script>
(function(){
  const batches = [
    {% for b in batches %}
      {id: {{ b.id }}, label: "{{ b.medicine.name|escapejs }} — {{ b.batch_number|default:b.id|escapejs }} (exp {{ b.expiry_date }}, qty {{ b.quantity }})", cost: {{ b.cost_price }}, qty: {{ b.quantity }}},
    {% endfor %}
  ];
  const tbody = document.querySelector('#items tbody');
  const totalEl = document.getElementById('grand-total');

  function renderRow(){
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <select name="batch_id[]" class="batch-select">
          <option value="">-- select batch --</option>
          ${batches.map(b => `<option value="${b.id}" data-cost="${b.cost}" data-qty="${b.qty}">${b.label}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" min="1" name="quantity[]" value="1" style="width:90px"></td>
      <td><input type="number" step="0.01" min="0" name="cost_price[]" placeholder="Auto" style="width:120px"></td>
      <td class="line-total">0</td>
      <td><button type="button" class="btn danger sm remove">×</button></td>
    `;
    tbody.appendChild(tr);
    bind(tr);
  }
  function bind(tr){
    const sel = tr.querySelector('.batch-select');
    const qty = tr.querySelector('input[name="quantity[]"]');
    const cost = tr.querySelector('input[name="cost_price[]"]');
    const lt = tr.querySelector('.line-total');
    function recalc(){
      const opt = sel.options[sel.selectedIndex];
      let c = parseFloat(cost.value);
      if (isNaN(c)) c = parseFloat(opt && opt.dataset ? opt.dataset.cost : '0') || 0;
      cost.placeholder = (opt && opt.dataset && opt.dataset.cost) ? parseFloat(opt.dataset.cost).toFixed(2) : 'Auto';
      const q = parseInt(qty.value || '0', 10);
      lt.textContent = (c * q).toFixed(2);
      grand();
    }
    sel.addEventListener('change', recalc);
    qty.addEventListener('input', recalc);
    cost.addEventListener('input', recalc);
    tr.querySelector('.remove').addEventListener('click', () => { tr.remove(); grand(); });
    recalc();
  }
  function grand(){
    let g = 0;
    [...tbody.querySelectorAll('.line-total')].forEach(td => g += parseFloat(td.textContent || '0'));
    totalEl.textContent = g.toFixed(2);
  }
  document.getElementById('add-row').addEventListener('click', renderRow);
  renderRow();
})();
</script>
{% endblock %}
