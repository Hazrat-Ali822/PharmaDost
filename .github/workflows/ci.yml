name: CI

# Regression testing: every push and every pull request re-runs the whole suite,
# so a change that breaks something already working is caught before it ships.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The suite runs on in-memory SQLite; never point CI at a real database.
  DJANGO_SETTINGS_MODULE: pharma_mgmt.test_settings
  DJANGO_SECRET_KEY: ci-only-not-a-real-secret
  DJANGO_DEBUG: "False"

jobs:
  tests:
    name: Unit, integration, smoke & security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Check for missing migrations
        # A model changed without a migration breaks deploys, not tests — catch it here.
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        # e2e is excluded here and runs in its own job with a browser installed.
        run: |
          coverage run manage.py test accounts audit billing customers imaging inventory \
            ipd lab opd ot patients prescriptions reports saas sales suppliers user_mgmt tests \
            --settings=pharma_mgmt.test_settings --verbosity=2

      - name: Coverage report
        run: |
          coverage report -m
          coverage xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  e2e:
    name: End-to-end browser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: python manage.py test e2e --settings=pharma_mgmt.test_settings --verbosity=2

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Django deployment check
        # Flags insecure production settings (DEBUG, cookie flags, HSTS, SECRET_KEY).
        # Informational: the desktop build intentionally relaxes some of these.
        run: python manage.py check --deploy --fail-level ERROR
        continue-on-error: true

      - name: Static security analysis (bandit)
        run: bandit -r . -x ./.venv,./e2e,./loadtest,./tests,./staticfiles,./desktop -ll
        continue-on-error: true

      - name: Dependency vulnerability audit (pip-audit)
        run: pip-audit --requirement requirements.txt --strict
        continue-on-error: true
